# =============================================================================
# release.yml — build packages and publish a GitHub release on tag push.
#
# Triggered by pushing a tag like v0.1.0. Builds entirely on Ubuntu using
# cargo-zigbuild for cross-compilation:
#   * Linux .deb + .rpm for x86_64 and aarch64 (musl) via nfpm
#   * Windows installer (.exe) via cargo-zigbuild + NSIS (makensis)
# then publishes a GitHub Release with notes from the matching CHANGELOG section.
# =============================================================================

name: EasyVault Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

jobs:
  # ── LINUX (deb + rpm, x86_64 + aarch64) ───────────────────────────────────
  build-linux:
    name: Linux · ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          cargo install cargo-zigbuild
          rustup target add ${{ matrix.target }}

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build Binary
        run: |
          mkdir -p dist build/bin
          cargo zigbuild --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/easyvault build/bin/

      - name: Package (deb + rpm)
        run: |
          case "${{ matrix.target }}" in
            x86_64-*)  ARCH=amd64 ;;
            aarch64-*) ARCH=arm64 ;;
          esac
          export ARCH
          export VERSION=$(grep -m1 '^version =' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          export RELEASE=1
          for PKG in deb rpm; do
            nfpm pkg --packager $PKG --config config/easyvault.yaml --target dist/
          done

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: dist/*
          retention-days: 1

  # ── WINDOWS (NSIS installer, x86_64) ──────────────────────────────────────
  build-windows:
    name: Windows · x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update && sudo apt-get install -y nsis
          cargo install cargo-zigbuild
          rustup target add x86_64-pc-windows-gnu

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build and Package
        run: |
          mkdir -p dist
          VERSION=$(grep -m1 '^version =' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          RELEASE=1
          cargo zigbuild --release --target x86_64-pc-windows-gnu
          cp target/x86_64-pc-windows-gnu/release/easyvault.exe packaging/windows/easyvault.exe
          cp config.toml.example packaging/windows/config.toml.example
          cp README.md packaging/windows/README.md
          INSTALLER="easyvault-${VERSION}-${RELEASE}-x86_64.exe"
          makensis -DVERSION="$VERSION" "-DINSTALLER_NAME=${INSTALLER}" packaging/windows/installer.nsi
          mv "packaging/windows/${INSTALLER}" dist/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: dist/*
          retention-days: 1

  # ── RELEASE ───────────────────────────────────────────────────────────────
  publish:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract Changelog for this Version
        id: changelog
        run: |
          VERSION=$(grep -m1 '^version =' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-packages
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./all-packages/*
          name: EasyVault ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
